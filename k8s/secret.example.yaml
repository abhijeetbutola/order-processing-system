# Copy to secret.yaml and fill in values (secret.yaml is gitignored):
#   cp k8s/secret.example.yaml k8s/secret.yaml
# Then apply:
#   kubectl apply -f k8s/secret.yaml
#
# For local learning only — use real secrets in production (Sealed Secrets, External Secrets, cloud secret manager).
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "order_processing"
  # Full Prisma URL — password must match POSTGRES_PASSWORD above
  DATABASE_URL: "postgresql://REPLACE_ME:REPLACE_ME@postgres:5432/order_processing"
