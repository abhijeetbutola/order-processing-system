# Phase 18 CI/CD — build Docker images and publish to GitHub Container Registry
#
# Flow:
#   PR / push  → install check → build images → migrate against ephemeral CI Postgres
#   push only  → push images to ghcr.io/<owner>/order-api and order-workers
#
# Deploy to a live cluster (kubectl set image) is intentionally later — Job 5 in ROADMAP.

name: CI

on:
  push:
    branches: [main, deployment]
  pull_request:
    branches: [main, deployment]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/order-api
  IMAGE_WORKERS: ghcr.io/${{ github.repository_owner }}/order-workers

jobs:
  checks:
    name: Install & Prisma generate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            workers/package-lock.json
            prisma/package-lock.json
            shared/package-lock.json

      - name: Install api dependencies
        working-directory: api
        run: npm ci --ignore-scripts

      - name: Install workers dependencies
        working-directory: workers
        run: npm ci --ignore-scripts

      - name: Install prisma package dependencies
        working-directory: prisma
        run: npm ci --ignore-scripts

      - name: Install shared package dependencies
        working-directory: shared
        run: npm ci --ignore-scripts

      # Same pattern as Dockerfiles: skip postinstall, generate after all node_modules exist
      - name: Generate Prisma clients
        working-directory: api
        run: npx prisma generate --schema=../prisma/schema.prisma

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: false
          tags: order-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build workers image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workers/Dockerfile
          push: false
          tags: order-workers:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Option B: run migrate once in the pipeline against a throwaway DB
  # (not against production). Staging/prod would use secrets.DATABASE_URL instead.
  # Enable: Settings → Secrets and variables → Actions → Variables → ENABLE_CI_MIGRATE=true
  # Also add secret CI_POSTGRES_PASSWORD (throwaway password for the ephemeral CI DB).
  migrate:
    name: Prisma migrate deploy (CI Postgres)
    runs-on: ubuntu-latest
    needs: checks
    if: ${{ vars.ENABLE_CI_MIGRATE == 'true' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: order_processing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d order_processing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install api dependencies
        working-directory: api
        run: npm ci --ignore-scripts

      - name: Run prisma migrate deploy
        working-directory: api
        env:
          DATABASE_URL: postgresql://ci:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/order_processing
        run: npx prisma migrate deploy --schema=../prisma/schema.prisma

  push-images:
    name: Push images to GHCR
    runs-on: ubuntu-latest
    needs: [checks, docker-build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Needed so ubuntu-latest (amd64) can build linux/arm64 for Apple Silicon / arm nodes
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Docker metadata (workers)
        id: meta-workers
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WORKERS }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push workers image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workers/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-workers.outputs.tags }}
          labels: ${{ steps.meta-workers.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
